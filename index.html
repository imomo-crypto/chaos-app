<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>乱做</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #f2e8d0;
  --bg2:   #e8dcc0;
  --bg3:   #ddd0b0;
  --panel: #faf4e8;
  --ink:   #3a2e1e;
  --ink2:  #6a5a40;
  --ink3:  #9a8a6a;
  --line:  #c8b898;
  --pk:    #c84060;
  --pk2:   #e86080;
  --grn:   #4a9050;
  --grn2:  #6ab870;
  --amb:   #d08020;
  --blue:  #4060a8;
  --px: 'Press Start 2P', monospace;
  --basket-h: 110px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--ink);font-family:var(--px);image-rendering:pixelated;}

/* scanline texture */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.015) 2px,rgba(0,0,0,0.015) 3px);pointer-events:none;z-index:9000;}

/* ── TOP BAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:500;
  background:var(--panel);
  border-bottom:4px solid var(--ink);
  box-shadow:0 4px 0 var(--ink2);
  padding:10px 14px 8px;
  display:flex;align-items:center;gap:10px;
}
.logo{font-size:11px;letter-spacing:.05em;color:var(--pk);
  text-shadow:2px 2px 0 var(--ink);}
.logo span{color:var(--amb);}
.topbar-mid{flex:1;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px 0;}
.topbar-mid::-webkit-scrollbar{display:none;}
.chip{font-family:var(--px);font-size:6px;padding:5px 8px;
  background:var(--bg2);border:2px solid var(--line);color:var(--ink3);
  cursor:pointer;white-space:nowrap;transition:all .1s;letter-spacing:.04em;}
.chip.active{background:var(--ink);border-color:var(--ink);color:var(--bg);}
.topbar-right{display:flex;gap:6px;flex-shrink:0;}
.px-btn{font-family:var(--px);font-size:7px;padding:6px 9px;
  background:var(--bg2);border:2px solid var(--ink);color:var(--ink);
  cursor:pointer;transition:all .1s;letter-spacing:.04em;
  box-shadow:2px 2px 0 var(--ink2);}
.px-btn:active{box-shadow:none;transform:translate(2px,2px);}
.px-btn.accent{background:var(--pk);border-color:var(--ink);color:white;box-shadow:2px 2px 0 #801828;}
.px-btn.accent:active{box-shadow:none;}

/* ── BUBBLE FIELD ── */
#field{
  position:fixed;
  top:52px; left:0; right:0;
  bottom:var(--basket-h);
  overflow:hidden;
}

.bubble{
  position:absolute;
  border:3px solid var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:3px 3px 0 var(--ink);
  transition:transform .1s, box-shadow .1s;
  border-radius:50%;
  animation:breathe 3s ease-in-out infinite;
}
.bubble:nth-child(2n){animation-delay:-1s;}
.bubble:nth-child(3n){animation-delay:-2s;}
@keyframes breathe{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
}
.bubble:hover{transform:translateY(-8px) scale(1.06)!important;box-shadow:4px 4px 0 var(--ink);}
.bubble:active{transform:translate(2px,2px)!important;box-shadow:1px 1px 0 var(--ink)!important;}
.bubble.done{opacity:0.3;pointer-events:none;}

.b-label{font-size:10px;text-align:center;padding:8px;line-height:1.7;
  color:var(--ink);letter-spacing:.04em;max-width:90%;font-weight:900;
  font-family:'PingFang SC','Noto Sans SC','Press Start 2P',monospace;}
.b-time{font-size:6px;color:var(--ink3);margin-top:3px;letter-spacing:.05em;}
.b-fruit{font-size:10px;position:absolute;top:-4px;right:-4px;
  background:var(--panel);border:2px solid var(--ink);border-radius:50%;
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;line-height:1;}

/* sizes */
.b-xs{width:68px;height:68px;} .b-xs .b-label{font-size:6px;}
.b-s{width:84px;height:84px;}
.b-m{width:104px;height:104px;} .b-m .b-label{font-size:8px;}
.b-l{width:128px;height:128px;} .b-l .b-label{font-size:9px;}

/* project colors */
.pc0{background:#fde8ec;border-color:#c84060;} .pc0 .b-label{color:#7a1030;}
.pc1{background:#e8eaff;border-color:#4060a8;} .pc1 .b-label{color:#202870;}
.pc2{background:#e8f8e8;border-color:#4a9050;} .pc2 .b-label{color:#1a5020;}
.pc3{background:#fff4d8;border-color:#d08020;} .pc3 .b-label{color:#704010;}
.pc4{background:#e8f4ff;border-color:#4090c0;} .pc4 .b-label{color:#103060;}
.pc5{background:#f8e8ff;border-color:#9050a8;} .pc5 .b-label{color:#501870;}

/* ── BASKET ── */
#basket-zone{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--basket-h);
  background:var(--panel);
  border-top:4px solid var(--ink);
  box-shadow:0 -4px 0 var(--bg3);
  display:flex;align-items:center;justify-content:center;
  gap:16px;
  padding:0 16px;
  overflow:hidden;
}

/* pixel basket SVG */
#basket-svg{flex-shrink:0;image-rendering:pixelated;}

/* fruit pile inside basket display */
#fruit-pile{
  display:flex;flex-wrap:wrap;gap:3px;align-items:flex-end;
  max-width:200px;min-height:50px;align-content:flex-end;
}
.pile-fruit{font-size:14px;line-height:1;animation:popIn .3s cubic-bezier(.175,.885,.32,1.275);}
@keyframes popIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}

#basket-stats{
  display:flex;flex-direction:column;gap:6px;
  font-size:7px;color:var(--ink2);letter-spacing:.05em;
}
#basket-count{font-size:11px;color:var(--grn);display:block;}
#basket-time{color:var(--ink3);font-size:6px;}

/* falling fruit animation */
.falling-fruit{
  position:fixed;
  font-size:18px;
  z-index:8000;
  pointer-events:none;
  animation:fall .7s cubic-bezier(.4,0,.8,1) forwards;
}
@keyframes fall{
  0%{transform:scale(1.2) rotate(0deg);opacity:1;}
  60%{transform:scale(1) rotate(180deg);opacity:1;}
  100%{transform:scale(0.5) rotate(360deg);opacity:0;}
}

/* ── DETAIL SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(58,46,30,.5);display:none;z-index:1000;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{
  background:var(--panel);
  border:4px solid var(--ink);
  box-shadow:-4px 0 0 var(--ink2), 4px 0 0 var(--ink2), 0 -4px 0 var(--ink2);
  width:100%;max-width:480px;
  padding:20px 20px 36px;
  max-height:85vh;overflow-y:auto;
  animation:slideUp .22s ease-out;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-handle{width:32px;height:4px;background:var(--line);margin:0 auto 18px;border:1px solid var(--ink3);}
.s-badge{display:inline-flex;align-items:center;gap:6px;
  background:var(--bg2);border:2px solid var(--line);padding:4px 10px;margin-bottom:12px;font-size:7px;color:var(--ink2);}
.s-time-val{font-size:10px;color:var(--pk);}
.s-title{font-size:11px;color:var(--ink);line-height:1.8;margin-bottom:10px;}
.s-note{font-size:8px;color:var(--ink2);line-height:2.2;padding:10px 12px;
  background:var(--bg2);border-left:4px solid var(--pk);margin-bottom:14px;letter-spacing:.04em;}
.s-proj{font-size:7px;color:var(--ink3);margin-bottom:18px;letter-spacing:.08em;}
.s-actions{display:flex;flex-direction:column;gap:8px;}
.s-btn{width:100%;padding:12px;font-family:var(--px);font-size:8px;letter-spacing:.06em;
  cursor:pointer;border:2px solid var(--ink);transition:all .1s;}
.s-btn:active{transform:translate(2px,2px);}
.s-start{background:var(--grn);color:white;box-shadow:3px 3px 0 #1a4020;}
.s-start:active{box-shadow:none;}
.s-split{background:var(--bg2);color:var(--ink2);box-shadow:3px 3px 0 var(--ink3);}
.s-split:active{box-shadow:none;}
.s-swap{background:transparent;border-color:var(--line);color:var(--ink3);font-size:7px;}
.s-add{background:transparent;border-color:var(--amb);color:var(--amb);font-size:7px;box-shadow:2px 2px 0 #906010;}
.s-add:active{box-shadow:none;}
.split-items{margin-top:6px;display:flex;flex-direction:column;gap:6px;display:none;}
.split-item{background:var(--bg2);border:2px solid var(--line);padding:10px 12px;cursor:pointer;transition:border-color .15s;}
.split-item:hover{border-color:var(--pk);}
.si-time{font-size:6px;color:var(--pk);margin-bottom:5px;}
.si-name{font-size:8px;color:var(--ink);margin-bottom:4px;}
.si-note{font-size:7px;color:var(--ink3);line-height:1.8;}

/* ── POMODORO ── */
.pomo-overlay{position:fixed;inset:0;background:var(--ink);display:none;z-index:2000;
  flex-direction:column;align-items:center;justify-content:center;gap:0;}
.pomo-overlay.open{display:flex;}
.pomo-title{font-size:7px;color:rgba(242,232,208,.4);text-align:center;max-width:240px;
  line-height:2.2;margin-bottom:32px;letter-spacing:.06em;}
.pomo-face{font-size:48px;margin-bottom:20px;animation:blink 2s steps(1) infinite;}
@keyframes blink{0%,90%{opacity:1;}91%,99%{opacity:0;}}
.pomo-time-big{font-size:36px;color:var(--bg);letter-spacing:.1em;margin-bottom:8px;}
.pomo-bar-wrap{width:200px;height:8px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);margin-bottom:32px;}
.pomo-bar{height:100%;background:var(--grn2);transition:width .9s linear;}
.pomo-btns{display:flex;gap:12px;}
.pomo-btn{font-family:var(--px);font-size:8px;padding:10px 18px;
  border:2px solid;cursor:pointer;letter-spacing:.06em;}
.pomo-btn.stop{background:transparent;border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.5);}
.pomo-btn.done{background:var(--grn);border-color:var(--grn2);color:white;box-shadow:2px 2px 0 #1a4020;}
.pomo-btn.done:active{box-shadow:none;transform:translate(2px,2px);}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(58,46,30,.6);display:none;z-index:3000;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--panel);border:4px solid var(--ink);
  box-shadow:-4px 0 0 var(--ink2),4px 0 0 var(--ink2),0 -4px 0 var(--ink2);
  width:100%;max-width:480px;padding:20px 20px 40px;max-height:90vh;overflow-y:auto;
  animation:slideUp .22s ease-out;}
.modal-title{font-size:10px;color:var(--ink);margin-bottom:12px;letter-spacing:.06em;}
.modal-sub{font-size:7px;color:var(--ink3);line-height:2.2;margin-bottom:14px;}
.prompt-scroll{background:var(--bg2);border:2px solid var(--line);padding:12px;
  max-height:140px;overflow-y:auto;font-size:7px;color:var(--ink2);line-height:2;
  white-space:pre-wrap;margin-bottom:12px;position:relative;}
.m-copy{position:sticky;top:0;float:right;font-family:var(--px);font-size:6px;
  padding:4px 8px;background:var(--pk);border:2px solid var(--ink);color:white;cursor:pointer;}
textarea.paste{width:100%;min-height:90px;background:var(--bg2);border:2px solid var(--line);
  color:var(--ink);font-family:var(--px);font-size:8px;padding:10px;outline:none;
  resize:vertical;transition:border-color .15s;}
textarea.paste:focus{border-color:var(--pk);}
textarea.paste::placeholder{color:var(--ink3);font-size:7px;}
.form-row{margin-bottom:12px;}
.form-label{font-size:7px;color:var(--ink3);margin-bottom:6px;display:block;letter-spacing:.08em;}
.form-input{width:100%;background:var(--bg2);border:2px solid var(--line);
  color:var(--ink);font-family:var(--px);font-size:8px;padding:8px 10px;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--pk);}
select.form-input{cursor:pointer;}
.sz-row{display:flex;gap:6px;}
.sz-opt{flex:1;padding:8px 4px;text-align:center;font-family:var(--px);font-size:6px;
  border:2px solid var(--line);background:var(--bg2);color:var(--ink3);cursor:pointer;transition:all .1s;}
.sz-opt.on{border-color:var(--ink);color:var(--ink);background:var(--bg3);}
.m-btns{display:flex;gap:8px;margin-top:16px;}
.m-btn{flex:1;padding:11px;font-family:var(--px);font-size:7px;letter-spacing:.06em;
  cursor:pointer;border:2px solid var(--ink);}
.m-btn.cancel{background:var(--bg2);color:var(--ink2);box-shadow:2px 2px 0 var(--ink3);}
.m-btn.go{background:var(--pk);color:white;box-shadow:2px 2px 0 #801828;}
.m-btn:active{box-shadow:none;transform:translate(2px,2px);}

/* ── GITHUB SYNC ── */
.sync-modal .form-input{font-size:7px;}
.sync-status{font-size:6px;padding:6px 8px;margin-top:8px;border:2px solid var(--line);}
.sync-ok{color:var(--grn);border-color:var(--grn);}
.sync-err{color:var(--pk);border-color:var(--pk);}

/* toast */
.toast{position:fixed;bottom:calc(var(--basket-h) + 10px);left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--ink);color:var(--bg);font-family:var(--px);font-size:7px;
  padding:9px 14px;opacity:0;transition:all .3s;z-index:9500;
  white-space:nowrap;pointer-events:none;letter-spacing:.06em;
  border:2px solid var(--ink2);box-shadow:2px 2px 0 var(--ink3);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--line);}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">乱<span>做</span></div>
  <div class="topbar-mid" id="filter-bar">
    <div class="chip active" data-f="all" onclick="setFilter('all')">全部</div>
  </div>
  <div class="topbar-right">
    <button class="px-btn" onclick="openSync()" title="GitHub 同步">⇅</button>
    <button class="px-btn" onclick="openManual()">+手动</button>
    <button class="px-btn accent" onclick="openImport()">+导入</button>
  </div>
</div>

<!-- BUBBLE FIELD -->
<div id="field"></div>

<!-- BASKET ZONE -->
<div id="basket-zone">
  <svg id="basket-svg" width="72" height="90" viewBox="0 0 72 90" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
    <!-- handle -->
    <rect x="16" y="6" width="4" height="20" fill="#8a6a30"/>
    <rect x="52" y="6" width="4" height="20" fill="#8a6a30"/>
    <rect x="16" y="6" width="40" height="4" fill="#6a4a18"/>
    <!-- body -->
    <rect x="6" y="26" width="60" height="56" fill="#c89040"/>
    <rect x="4" y="24" width="64" height="4" fill="#8a6a30"/>
    <rect x="2" y="28" width="4" height="52" fill="#8a6a30"/>
    <rect x="66" y="28" width="4" height="52" fill="#8a6a30"/>
    <rect x="2" y="78" width="68" height="4" fill="#8a6a30"/>
    <!-- weave lines -->
    <rect x="6" y="32" width="60" height="2" fill="#a87028" opacity=".5"/>
    <rect x="6" y="42" width="60" height="2" fill="#a87028" opacity=".5"/>
    <rect x="6" y="52" width="60" height="2" fill="#a87028" opacity=".5"/>
    <rect x="6" y="62" width="60" height="2" fill="#a87028" opacity=".5"/>
    <rect x="6" y="72" width="60" height="2" fill="#a87028" opacity=".5"/>
    <rect x="20" y="26" width="2" height="52" fill="#a87028" opacity=".4"/>
    <rect x="36" y="26" width="2" height="52" fill="#a87028" opacity=".4"/>
    <rect x="52" y="26" width="2" height="52" fill="#a87028" opacity=".4"/>
    <!-- shine -->
    <rect x="8" y="28" width="8" height="2" fill="rgba(255,255,255,.3)"/>
  </svg>

  <div id="fruit-pile"></div>

  <div id="basket-stats">
    <span id="basket-count">0</span>
    <span>个果实收获</span>
    <span id="basket-time"></span>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="overlay" id="sheet-overlay" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="s-badge">
      <span class="s-time-val" id="s-min"></span>
      <span style="font-size:6px;color:var(--ink3)">分钟</span>
      <span id="s-size" style="font-size:6px;color:var(--ink3);margin-left:4px;"></span>
    </div>
    <div class="s-title" id="s-title"></div>
    <div class="s-note" id="s-note"></div>
    <div class="s-proj" id="s-proj"></div>
    <div class="s-actions">
      <button class="s-btn s-start" onclick="startPomo()">▶ 开始执行</button>
      <div id="split-wrap" style="display:none;">
        <button class="s-btn s-split" onclick="toggleSplit()">✂ 帮我拆得更小</button>
        <div class="split-items" id="split-items"></div>
      </div>
      <button class="s-btn s-add" onclick="addToThisProject()">+ 给这个项目加任务</button>
      <button class="s-btn s-swap" onclick="swapTask()">↻ 换一个</button>
    </div>
  </div>
</div>

<!-- POMODORO -->
<div class="pomo-overlay" id="pomo-overlay">
  <div class="pomo-title" id="pomo-label"></div>
  <div class="pomo-face" id="pomo-face">🌱</div>
  <div class="pomo-time-big" id="pomo-time"></div>
  <div class="pomo-bar-wrap"><div class="pomo-bar" id="pomo-bar" style="width:0%"></div></div>
  <div class="pomo-btns">
    <button class="pomo-btn stop" onclick="stopPomo()">停止</button>
    <button class="pomo-btn done" onclick="completePomo()">完成 ✦</button>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-overlay" id="import-modal" onclick="if(event.target===this)closeImport()">
  <div class="modal">
    <div class="modal-title">导入任务</div>
    <div class="modal-sub">复制提示词 → 发给 Claude → 把回复粘贴进来</div>
    <div class="prompt-scroll">
      <button class="m-copy" onclick="copyPrompt()">复制</button>
      <span id="prompt-text"></span>
    </div>
    <textarea class="paste" id="paste-in" placeholder="把 Claude 的回复粘贴进来…"></textarea>
    <div class="m-btns">
      <button class="m-btn cancel" onclick="closeImport()">取消</button>
      <button class="m-btn go" onclick="doImport()">导入</button>
    </div>
  </div>
</div>

<!-- MANUAL MODAL -->
<div class="modal-overlay" id="manual-modal" onclick="if(event.target===this)closeManual()">
  <div class="modal">
    <div class="modal-title" id="manual-title">手动添加</div>
    <div class="form-row">
      <label class="form-label">项目</label>
      <select class="form-input" id="m-proj" onchange="onProjChange()"></select>
    </div>
    <div class="form-row" id="new-proj-row" style="display:none;">
      <input class="form-input" id="m-proj-name" placeholder="新项目名称"/>
    </div>
    <div class="form-row">
      <label class="form-label">任务名称（做完手里有什么？）</label>
      <input class="form-input" id="m-name" placeholder="例：列出3个候选名字划掉2个"/>
    </div>
    <div class="form-row">
      <label class="form-label">解说（可选）</label>
      <input class="form-input" id="m-note" placeholder="这一步难在哪、为什么没那么难"/>
    </div>
    <div class="form-row">
      <label class="form-label">预估时间（分钟）</label>
      <input class="form-input" id="m-mins" type="number" min="1" max="240" placeholder="15"/>
    </div>
    <div class="form-row">
      <label class="form-label">体量</label>
      <div class="sz-row" id="sz-row"></div>
    </div>
    <div class="m-btns">
      <button class="m-btn cancel" onclick="closeManual()">取消</button>
      <button class="m-btn go" onclick="doAdd()">添加</button>
    </div>
  </div>
</div>

<!-- GITHUB SYNC MODAL -->
<div class="modal-overlay sync-modal" id="sync-modal" onclick="if(event.target===this)closeSync()">
  <div class="modal">
    <div class="modal-title">GitHub 同步</div>
    <div class="modal-sub">数据存为仓库里的 JSON 文件，跨设备同步。Token 只存在本地。</div>
    <div class="form-row">
      <label class="form-label">GitHub 用户名</label>
      <input class="form-input" id="gh-user" placeholder="your-username"/>
    </div>
    <div class="form-row">
      <label class="form-label">仓库名</label>
      <input class="form-input" id="gh-repo" placeholder="my-tasks"/>
    </div>
    <div class="form-row">
      <label class="form-label">Personal Access Token（需要 repo 权限）</label>
      <input class="form-input" id="gh-token" type="password" placeholder="ghp_xxxxxx"/>
    </div>

<script>
// ══ STORAGE ══
const SK='chaos_v3';

// ══ PROMPT ══
const PROMPT=`你在帮一个容易启动困难的人拆任务。

规则：
1. 每条任务描述"做完之后手里有什么"，不描述过程

6. size：XS=5分钟内，S=5-15分钟，M=15-40分钟，L=40分钟以上

格式：
{
  "projects": [
    {

        {

}

我想完成的事：[在这里描述]`;

// ══ STATE ══
const PC=['#c84060','#4060a8','#4a9050','#d08020','#4090c0','#9050a8'];
const FRUITS=['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🥝','🫐','🍈'];
let curFilter='all', curTaskId=null, splitOpen=false;
let pomoIv=null, pomoTotal=0, pomoLeft=0, pomoTaskId=null;
let _sz='S', _lockProjId=null;

function projFruit(pi){ return FRUITS[pi%FRUITS.length]; }
function projColor(pi){ return PC[pi%6]; }
function projClass(pi){ return 'pc'+pi%6; }

// ══ TASKS ══
function allTasks(data){
  const out=[];
  (data.projects||[]).forEach((p,pi)=>{
    (p.tasks||[]).forEach(t=>out.push({...t,_pi:pi,_pid:p.id,_pname:p.name}));
  });
  return out;
}
function getTask(data,id){ return allTasks(data).find(t=>t.id===id); }
function isDone(data,id){ return !!(data.done||[]).find(d=>d.id===id); }

function markDone(data,id){
  if(isDone(data,id)) return;
  const t=getTask(data,id);
  if(!t) return;
  data.done.push({id,name:t.name,pid:t._pid,pi:t._pi,mins:t.minutes||0,fruit:projFruit(t._pi),date:new Date().toISOString().split('T')[0]});
}

// ══ FILTER ══
function setFilter(f){
  curFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.f===f));
  renderField();
}
function buildFilters(data){
  const bar=document.getElementById('filter-bar');
  bar.innerHTML=`<div class="chip active" data-f="all" onclick="setFilter('all')">全部</div>`
    +(data.projects||[]).map((p,pi)=>`<div class="chip" data-f="${p.id}" onclick="setFilter('${p.id}')"
      style="${curFilter===p.id?`background:${projColor(pi)};border-color:${projColor(pi)};color:white`:''}">
      ${p.name}</div>`).join('');
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.f===curFilter));
}

// ══ BUBBLE PLACEMENT (no overlap grid approach) ══
function sizePx(sz){ return {XS:68,S:84,M:104,L:128}[sz]||84; }
function sizeClass(sz){ return {XS:'b-xs',S:'b-s',M:'b-m',L:'b-l'}[sz]||'b-s'; }

function placeBubbles(tasks){
  const W=window.innerWidth, H=window.innerHeight;
  const TOP=54, BOT=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--basket-h'))||110;
  const AVAIL_H=H-TOP-BOT;
  const PAD=10;
  const placed=[];

  function overlaps(x,y,d){
    for(const p of placed){
      const dx=(x+d/2)-(p.x+p.d/2), dy=(y+d/2)-(p.y+p.d/2);
      if(Math.sqrt(dx*dx+dy*dy)<(d+p.d)/2+PAD) return true;
    }
    return false;
  }

  return tasks.map(t=>{
    const d=sizePx(t.size||'S');
    let best=null, tries=0;
    while(tries<200){
      const x=PAD+Math.random()*(W-d-PAD*2);
      const y=TOP+PAD+Math.random()*(AVAIL_H-d-PAD*2);
      if(!overlaps(x,y,d)){ best={x,y}; break; }
      tries++;
    }
    // fallback: just random if can't place
    if(!best) best={x:PAD+Math.random()*(W-d-PAD*2), y:TOP+PAD+Math.random()*(AVAIL_H-d-PAD*2)};
    placed.push({x:best.x,y:best.y,d});
    return {...t,_x:best.x,_y:best.y};
  });
}

// ══ RENDER FIELD ══
function renderField(){
  const data=ld();
  buildFilters(data);
  const field=document.getElementById('field');
  field.innerHTML='';
  const tasks=allTasks(data).filter(t=>curFilter==='all'||t._pid===curFilter);
  if(!tasks.length){
    field.innerHTML=`<div style="position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);text-align:center;">
      <div style="font-size:8px;color:var(--ink3);line-height:3;">还没有任务<br><span style="font-size:7px;">点右上角 +导入 开始</span></div></div>`;
    renderBasket(data); return;
  }
  const placed=placeBubbles(tasks);
  placed.forEach(t=>{
    const done=isDone(data,t.id);
    const d=sizePx(t.size||'S');
    const el=document.createElement('div');
    el.className=`bubble ${sizeClass(t.size||'S')} ${projClass(t._pi)} ${done?'done':''}`;
    el.style.cssText=`left:${t._x}px;top:${t._y}px;width:${d}px;height:${d}px;animation-delay:${(t._pi*.7+placed.indexOf(t)*.3)%3}s`;
    el.innerHTML=`<div class="b-label">${shortKey(t.name)}</div>
      ${t.minutes?`<div class="b-time">${t.minutes}m</div>`:''}
      <div class="b-fruit">${projFruit(t._pi)}</div>`;
    if(!done) el.onclick=()=>openSheet(t.id);
    field.appendChild(el);
  });
  renderBasket(data);
}

function shortKey(name){
  const rules=[
    [/图标/,'做图标'],[/名字|命名|起名|候选名/,'起名字'],[/问句|问题模板/,'改问句'],
    [/[Gg]it[Hh]ub|仓库|推送/,'推GitHub'],[/发布帖|发帖|小红书发布/,'写发布帖'],
    [/截图/,'截图'],[/调性|定位/,'账号调性'],[/参考|调研/,'找参考'],
    [/[Bb]ug|修复/,'修bug'],[/测试|验证/,'测试'],[/文案|正文/,'写文案'],
    [/卖点/,'列卖点'],[/混淆/,'代码混淆'],[/[Ll]anding/,'落地页'],
    [/购买流程/,'测购买流程'],[/付款/,'配置付款'],
  ];
  for(const [re,label] of rules){ if(re.test(name)) return label; }
  const clean=name
    .replace(/^(把|将|整理|完成|检查|写出|列出|找出|确认|整合|修改|改掉|发布|建好|推上|导出|确定|读出)/,'')
    .replace(/[，。？！、…].*/,'').trim();
  return clean.length<=5 ? clean : clean.slice(0,5);
}

// ══ BASKET ══
function renderBasket(data){
  const done=data.done||[];
  document.getElementById('basket-count').textContent=done.length;
  const totalMins=done.reduce((s,d)=>s+(d.mins||0),0);

// ══ FALLING FRUIT ANIMATION ══
function dropFruit(taskEl, fruit){
  if(!taskEl) return;
  const rect=taskEl.getBoundingClientRect();
  const basketRect=document.getElementById('basket-zone').getBoundingClientRect();
  const el=document.createElement('div');
  el.className='falling-fruit';
  el.textContent=fruit;
  el.style.left=(rect.left+rect.width/2-12)+'px';
  el.style.top=(rect.top+rect.height/2-12)+'px';
  const dx=basketRect.left+40-(rect.left+rect.width/2);
  const dy=basketRect.top+40-(rect.top+rect.height/2);
  el.style.setProperty('--dx',dx+'px');
  el.style.setProperty('--dy',dy+'px');
  el.style.animation='none';
  document.body.appendChild(el);
  // manual keyframe via JS
  el.animate([
    {transform:'scale(1.2) rotate(0deg)',opacity:1,top:(rect.top+rect.height/2-12)+'px',left:(rect.left+rect.width/2-12)+'px'},
    {transform:'scale(0.6) rotate(360deg)',opacity:0.8,top:(basketRect.top+30)+'px',left:(basketRect.left+35)+'px'},
    {transform:'scale(0) rotate(450deg)',opacity:0,top:(basketRect.top+50)+'px',left:(basketRect.left+36)+'px'},
  ],{duration:700,easing:'cubic-bezier(.4,0,.8,1)',fill:'forwards'})
    .onfinish=()=>el.remove();
}

// ══ SHEET ══
function openSheet(id){

// ══ POMODORO ══
function startPomo(){ const data=ld(); const t=getTask(data,curTaskId); if(!t) return; document.getElementById('sheet-overlay').classList.remove('open'); launchPomo(t.minutes||25,t.name,curTaskId); }

function launchPomo(mins,name,taskId){
  pomoTaskId=taskId; pomoTotal=mins*60;
  pomoLeft=pomoTotal;
  window._pomoStart=Date.now();
  window._pomoMins=mins;
  document.getElementById('pomo-label').textContent=name;
  document.getElementById('pomo-overlay').classList.add('open');
  tickPomo();
  clearInterval(pomoIv);
  pomoIv=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-window._pomoStart)/1000);
    pomoLeft=Math.max(0, pomoTotal-elapsed);
    if(pomoLeft<=0){clearInterval(pomoIv);completePomo();return;}
    tickPomo();
  },500);
}
function tickPomo(){
  const m=Math.floor(pomoLeft/60),s=pomoLeft%60;
  document.getElementById('pomo-time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  const pct=Math.round((1-pomoLeft/pomoTotal)*100);
  document.getElementById('pomo-bar').style.width=pct+'%';
  const faces=['🌱','🌿','🌾','🍀','🌻'];
  document.getElementById('pomo-face').textContent=faces[Math.min(4,Math.floor(pct/21))];
}
function stopPomo(){ clearInterval(pomoIv); document.getElementById('pomo-overlay').classList.remove('open'); }
function completePomo(){
  clearInterval(pomoIv);
  document.getElementById('pomo-overlay').classList.remove('open');
  if(!pomoTaskId) return;
  const data=ld();
  const t=getTask(data,pomoTaskId);
  if(!t||isDone(data,pomoTaskId)) return;
  markDone(data,pomoTaskId); sv(data);
  // find bubble element for animation
  renderField();
  setTimeout(()=>{
    const pile=document.getElementById('fruit-pile');
    const last=pile.lastElementChild;
    if(last){ last.style.transform='scale(1.5)'; setTimeout(()=>last.style.transform='',300); }
    showToast('✦ 收获了一个 '+projFruit(t._pi));
  },100);
}

const GH_SK='chaos_gh';
const GH_PATH='chaos-data.json';
let _ghPushTimer=null, _ghSha='', _ghBusy=false;

function ghConf(){ return JSON.parse(localStorage.getItem(GH_SK)||'{}'); }
function ghSave(c){ localStorage.setItem(GH_SK,JSON.stringify(c)); }
function openSync(){
  const c=ghConf();
  document.getElementById('gh-user').value=c.user||'';
  document.getElementById('gh-repo').value=c.repo||'';
  document.getElementById('gh-token').value=c.token||'';
  document.getElementById('sync-status').style.display='none';
  document.getElementById('sync-modal').classList.add('open');
}
function closeSync(){ document.getElementById('sync-modal').classList.remove('open'); }
function syncConf(){ return {user:document.getElementById('gh-user').value.trim(), repo:document.getElementById('gh-repo').value.trim(), token:document.getElementById('gh-token').value.trim()}; }
function showSyncStatus(msg,ok){ const el=document.getElementById('sync-status'); el.textContent=msg; el.className='sync-status '+(ok?'sync-ok':'sync-err'); el.style.display='block'; }

function ghApiUrl(c){ return `https://api.github.com/repos/${c.user}/${c.repo}/contents/${GH_PATH}`; }
function ghHeaders(c){ return {'Authorization':'token '+c.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'}; }

// auto-push: debounced 2s after last change
function ghAutoPush(data){
  const c=ghConf(); if(!c.user||!c.repo||!c.token) return;
  clearTimeout(_ghPushTimer);
  _ghPushTimer=setTimeout(()=>_ghDoPush(c,data),2000);
}

async function _ghDoPush(c,data){
  if(_ghBusy) return; _ghBusy=true;
  updateSyncIcon('syncing');
  try{
    const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
    // refresh sha
    const get=await fetch(ghApiUrl(c),{headers:ghHeaders(c)});
    if(get.ok){ const j=await get.json(); _ghSha=j.sha||''; }
    const body={message:'auto sync '+new Date().toISOString(),content:encoded};
    if(_ghSha) body.sha=_ghSha;
    const put=await fetch(ghApiUrl(c),{method:'PUT',headers:ghHeaders(c),body:JSON.stringify(body)});
    if(put.ok){ const j=await put.json(); _ghSha=j.content?.sha||_ghSha; updateSyncIcon('ok'); }
    else updateSyncIcon('err');
  }catch{ updateSyncIcon('err'); }
  _ghBusy=false;
}

// auto-pull on boot
async function ghAutoPull(){
  const c=ghConf(); if(!c.user||!c.repo||!c.token) return;
  updateSyncIcon('syncing');
  try{
    const res=await fetch(ghApiUrl(c),{headers:ghHeaders(c)});
    if(!res.ok){ updateSyncIcon('err'); return; }
    const j=await res.json();
    _ghSha=j.sha||'';
    const decoded=decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))));
    const remote=JSON.parse(decoded);
    // merge: prefer remote if it has more done items
    const local=ld();
    const merged=(remote.done||[]).length>=(local.done||[]).length ? remote : local;
    localStorage.setItem(SK,JSON.stringify(merged));
    updateSyncIcon('ok');
    renderField();
  }catch{ updateSyncIcon('err'); }
}

function updateSyncIcon(state){
  const btn=document.querySelector('.px-btn[onclick="openSync()"]');
  if(!btn) return;
  btn.textContent={syncing:'↻',ok:'⇅',err:'⚠'}[state]||'⇅';
  btn.style.color={syncing:'var(--amb)',ok:'var(--grn)',err:'var(--pk)'}[state]||'';
  if(state==='ok') setTimeout(()=>{btn.textContent='⇅';btn.style.color='';},2000);
}

// manual push/pull from settings modal
async function ghPush(){
  const c=syncConf(); if(!c.user||!c.repo||!c.token){showSyncStatus('请填写所有字段',false);return;}
  ghSave(c); showSyncStatus('推送中…',true);
  await _ghDoPush(c,ld());
  showSyncStatus(_ghBusy?'推送中…':'✦ 推送成功',true);
}
async function ghPull(){
  const c=syncConf(); if(!c.user||!c.repo||!c.token){showSyncStatus('请填写所有字段',false);return;}
  ghSave(c); showSyncStatus('拉取中…',true);
  await ghAutoPull();
  showSyncStatus('✦ 拉取成功',true);
}

function seed(){
